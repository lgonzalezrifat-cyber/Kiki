<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> - Collage </title>
    <style>
        body {
            background-color: #050505;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .monitor-container {
            text-align: center;
            padding: 30px;
            border-radius: 20px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            width: 95%;
            max-width: 600px;
            z-index: 2;
            transition: border 0.5s ease;
        }

        /* CONTENEDOR DE LA FOTO CON MARCO DINÁMICO */
        .img-frame {
            position: relative;
            width: 320px;
            height: 400px;
            margin: 0 auto 20px auto;
            border: 8px solid #ffdf00; /* Color inicial */
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 223, 0, 0.5);
            transition: all 0.5s ease;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }

        #quote-container {
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quote-text {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        #start-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="monitor-container" id="main-box">
        <button id="start-btn">VER COLLAGE DE YAMILET</button>
        
        <div id="content" class="hidden">
            <div class="img-frame" id="frame">
                <img id="slideshow" src="19958.jpg" alt="Yamilet Rifat" class="profile-img">
            </div>
            
            <div id="quote-container"></div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="Melendi-La promesa.mp4" type="audio/mpeg">
    </audio>

    <script>
const photos = ["19958.jpg", "19951.jpg", "19962.jpg", "19935.jpg", "19947.jpg", "19943.jpg", "1230.jpg"];
        const quotes = [
            "¡YAMILET, REINA DE SU DESTINO!",
            "CADA MOMENTO ES UNA VICTORIA.",
            "LA ELEGANCIA ES TU PODER.",
            "BRILLANDO EN CADA LUGAR.",
            "NADA TE DETIENE.",
            "DE PARTE DEL KIKI CON AMOR."
        ];
        const colors = ['#ff4d4d', '#4dff4d', '#ffdf00', '#ff4dff', '#4dd2ff', '#ffffff'];
        
        const startBtn = document.getElementById('start-btn');
        const content = document.getElementById('content');
        const music = document.getElementById('bg-music');
        const imgElement = document.getElementById('slideshow');
        const frame = document.getElementById('frame');
        const mainBox = document.getElementById('main-box');
        const quoteContainer = document.getElementById('quote-container');
        
        let photoIndex = 0;
        let quoteIndex = 0;

        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden');
            content.classList.remove('hidden');
            music.play();
            updateGallery();
        });

        function updateGallery() {
            // Cambiar color aleatorio para el MARCO y el TEXTO
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            
            // Aplicar color al marco y a la sombra
            frame.style.borderColor = randomColor;
            frame.style.boxShadow = `0 0 40px ${randomColor}`;
            mainBox.style.border = `1px solid ${randomColor}`;

            // Cambiar Foto con efecto
            imgElement.style.opacity = 0;
            
            setTimeout(() => {
                imgElement.src = photos[photoIndex];
                imgElement.style.opacity = 1;
                
                // Cambiar Texto
                quoteContainer.innerHTML = `<h1 class="quote-text" style="color: ${randomColor}">${quotes[quoteIndex]}</h1>`;
                
                // Avanzar índices
                photoIndex = (photoIndex + 1) % photos.length;
                quoteIndex = (quoteIndex + 1) % quotes.length;
            }, 500);

            // Tiempo entre cada cambio (3 segundos)
            setTimeout(updateGallery, 3500);
        }
    </script>
</body>
</html>
