<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collage Yamilet - La Promesa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        /* Video de fondo */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translateX(-50%) translateY(-50%);
            z-index: -1;
            object-fit: cover;
        }
        .monitor-container {
            text-align: center;
            padding: 30px;
            border-radius: 20px;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.15);
            width: 90%;
            max-width: 600px;
            z-index: 2;
            transition: all 0.5s ease;
            border: 2px solid transparent;
        }
        .img-frame {
            position: relative;
            width: 300px;
            height: 380px;
            margin: 0 auto 20px auto;
            border: 8px solid #ffdf00;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 223, 0, 0.5);
            transition: all 0.5s ease;
            background: #222;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.8s ease-in-out;
            opacity: 1;
        }
        #quote-container {
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .quote-text {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin: 0;
        }
        #start-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transition: transform 0.2s;
        }
        #start-btn:active { transform: scale(0.95); }
        .hidden { display: none; }

        #unmute-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.5rem;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="Melendi - La promesa.mp4" type="video/mp4">
    </video>

    <button id="unmute-btn">🔇</button>

    <div class="monitor-container" id="main-box">
        <button id="start-btn" onclick="iniciarCollage()">VER COLLAGE DE YAMILET</button>
       
        <div id="content" class="hidden">
            <div class="img-frame" id="frame">
                <img id="slideshow" src="19958.jpg" alt="Yamilet" class="profile-img">
            </div>
            <div id="quote-container">
                <h1 class="quote-text" id="texto-frase">¡BIENVENIDA!</h1>
            </div>
        </div>
    </div>

    <script>
        // Lista exacta basada en tus archivos de GitHub
        const photos = ["19958.jpg", "19951.jpg", "19962.jpg", "19935.jpg", "19947.jpg", "19943.jpg", "1230.jpg"];
        const quotes = [
            "¡YAMILET, REINA DE SU DESTINO!",
            "CADA MOMENTO ES UNA VICTORIA.",
            "LA ELEGANCIA ES TU PODER.",
            "BRILLANDO EN CADA LUGAR.",
            "NADA TE DETIENE.",
            "DE PARTE DEL KIKI CON AMOR."
        ];
        const colors = ['#ff4d4d', '#4dff4d', '#ffdf00', '#ff4dff', '#4dd2ff', '#ffffff'];
       
        let photoIndex = 0;
        let quoteIndex = 0;
        let intervalo;

        const video = document.getElementById('bg-video');
        const unmuteBtn = document.getElementById('unmute-btn');
        const imgElement = document.getElementById('slideshow');
        const textoFrase = document.getElementById('texto-frase');
        const frame = document.getElementById('frame');
        const mainBox = document.getElementById('main-box');

        // Sonido
        unmuteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            unmuteBtn.textContent = video.muted ? '🔇' : '🔊';
        });

        function iniciarCollage() {
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            
            // Iniciar ciclo
            cambiarContenido();
            intervalo = setInterval(cambiarContenido, 3500);
        }

        function cambiarContenido() {
            const colorAleatorio = colors[Math.floor(Math.random() * colors.length)];
            
            // Efecto de desvanecimiento
            imgElement.style.opacity = 0;
            
            setTimeout(() => {
                // Cambiar imagen y texto
                imgElement.src = photos[photoIndex];
                textoFrase.textContent = quotes[quoteIndex];
                textoFrase.style.color = colorAleatorio;
                
                // Cambiar bordes y luces
                frame.style.borderColor = colorAleatorio;
                frame.style.boxShadow = `0 0 30px ${colorAleatorio}`;
                mainBox.style.borderColor = colorAleatorio;

                // Mostrar de nuevo
                imgElement.style.opacity = 1;

                // Avanzar índices
                photoIndex = (photoIndex + 1) % photos.length;
                quoteIndex = (quoteIndex + 1) % quotes.length;
            }, 800);
        }
    </script>
</body>
</html>
