<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collage Yamilet - La Promesa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        /* Video de fondo */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translateX(-50%) translateY(-50%);
            z-index: -1;
            object-fit: cover;
        }
        .monitor-container {
            text-align: center;
            padding: 30px;
            border-radius: 20px;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.15);
            width: 90%;
            max-width: 600px;
            z-index: 2;
            transition: border 0.5s ease;
        }
        .img-frame {
            position: relative;
            width: 320px;
            height: 400px;
            margin: 0 auto 20px auto;
            border: 8px solid #ffdf00;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 223, 0, 0.5);
            transition: all 0.5s ease;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }
        #quote-container {
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .quote-text {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        #start-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
        .hidden { display: none; }

        /* Botón de unmute (volumen) */
        #unmute-btn {
            position: fixed;
            bottom: 267px;
            right: 100px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 20px 24px;
            font-size: 2rem;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }
        #unmute-btn:hover {
            background: rgba(0,0,0,0.8);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <!-- Video La Promesa como fondo -->
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="Melendi - La promesa.mp4" type="video/mp4">
        Tu navegador no soporta el elemento de video.
    </video>

    <!-- Botón para activar/desactivar sonido -->
    <button id="unmute-btn">🔇</button>

    <div class="monitor-container" id="main-box">
        <button id="start-btn">VER COLLAGE DE YAMILET</button>
       
        <div id="content" class="hidden">
            <div class="img-frame" id="frame">
                <img id="slideshow" src="19958.jpg" alt="Yamilet Rifat" class="profile-img">
            </div>
           
            <div id="quote-container"></div>
        </div>
    </div>

    <script>
        const photos = ["19958.jpg", "19951.jpg", "19962.jpg", "19935.jpg", "19947.jpg", "19943.jpg", "1230.jpg"];
        const quotes = [
            "¡YAMILET, REINA DE SU DESTINO!",
            "CADA MOMENTO ES UNA VICTORIA.",
            "LA ELEGANCIA ES TU PODER.",
            "BRILLANDO EN CADA LUGAR.",
            "NADA TE DETIENE.",
            "DE PARTE DEL KIKI CON AMOR."
        ];
        const colors = ['#ff4d4d', '#4dff4d', '#ffdf00', '#ff4dff', '#4dd2ff', '#ffffff'];
       
        const startBtn = document.getElementById('start-btn');
        const content = document.getElementById('content');
        const imgElement = document.getElementById('slideshow');
        const frame = document.getElementById('frame');
        const mainBox = document.getElementById('main-box');
        const quoteContainer = document.getElementById('quote-container');
        const unmuteBtn = document.getElementById('unmute-btn');
        const video = document.getElementById('bg-video');

        let photoIndex = 0;
        let quoteIndex = 0;

        // Control del sonido
        unmuteBtn.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                unmuteBtn.textContent = '🔊';
            } else {
                video.muted = true;
                unmuteBtn.textContent = '🔇';
            }
        });

        // Iniciar el collage al presionar el botón principal
        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden');
            content.classList.remove('hidden');
            updateGallery();
        });

        function updateGallery() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
           
            frame.style.borderColor = randomColor;
            frame.style.boxShadow = `0 0 40px ${randomColor}`;
            mainBox.style.border = `1px solid ${randomColor}`;
            imgElement.style.opacity = 0;
           
            setTimeout(() => {
                imgElement.src = photos[photoIndex];
                imgElement.style.opacity = 1;
               
                quoteContainer.innerHTML = `<h1 class="quote-text" style="color: ${randomColor}">${quotes[quoteIndex]}</h1>`;
               
                photoIndex = (photoIndex + 1) % photos.length;
                quoteIndex = (quoteIndex + 1) % quotes.length;
            }, 500);

            setTimeout(updateGallery, 3500);
        }
    </script>
</body>
</html>
