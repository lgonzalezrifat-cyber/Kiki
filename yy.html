<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collage de Yamilet ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: radial-gradient(ellipse at bottom, #0b001f 0%, #000814 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }
        .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }
        .shooting-star {
            position:absolute; width:5px; height:80px;
            background: linear-gradient(transparent, #fff, transparent);
            border-radius:50%; transform:rotate(30deg); opacity:0;
            animation: shoot linear infinite;
            box-shadow: 0 0 30px #fff, 0 0 60px #fff;
        }
        @keyframes shoot {
            0% { transform: translateX(-120vw) translateY(-120vh) rotate(30deg); opacity:0; }
            15% { opacity:1; }
            60% { opacity:1; }
            100% { transform: translateX(120vw) translateY(120vh) rotate(30deg); opacity:0; }
        }
        .background-stars { position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.2; }
        .background-stars::before {
            content:''; position:absolute; inset:0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><circle cx="20" cy="20" r="1.5" fill="white"/><circle cx="50" cy="90" r="1.2" fill="white"/><circle cx="100" cy="30" r="1.8" fill="white"/></svg>') repeat;
            animation: twinkle 12s infinite alternate;
        }
        @keyframes twinkle { 0%,100% { opacity:0.15; } 50% { opacity:0.35; } }

        .monitor-container {
            text-align:center; padding:50px 40px; border-radius:40px;
            background:rgba(10,10,30,0.75); backdrop-filter:blur(20px);
            box-shadow:0 0 80px rgba(255,215,0,0.4), inset 0 0 40px rgba(255,255,255,0.12);
            width:95%; max-width:750px; z-index:10;
            border:1px solid rgba(255,215,0,0.5); transition:all 0.7s ease;
        }

        .img-frame {
            position:relative; width:380px; height:480px; margin:0 auto 40px;
            border:14px solid #ffdf00; border-radius:32px; overflow:hidden;
            box-shadow:0 0 70px rgba(255,215,0,0.8), inset 0 0 30px rgba(0,0,0,0.8);
            transition:all 0.9s ease;
        }
        .profile-img { width:100%; height:100%; object-fit:cover; transition:transform 1s ease, opacity 0.8s ease; }

        #quote-container { min-height:140px; display:flex; justify-content:center; align-items:center; margin-bottom:40px; }
        .quote-text {
            font-family:'Poppins', sans-serif; font-weight:900; font-size:2.4rem;
            text-shadow:0 0 30px rgba(0,0,0,1), 0 0 60px currentColor;
            letter-spacing:2px; line-height:1.3; max-width:95%; text-align:center;
            padding:15px 25px; border-radius:20px; background:rgba(0,0,0,0.45);
            transition:all 0.8s ease;
        }

        #start-btn {
            background:linear-gradient(135deg, #ffd700, #ffaa00); color:#000;
            border:none; padding:22px 80px; font-size:1.7rem; font-weight:900;
            border-radius:80px; cursor:pointer; box-shadow:0 0 60px rgba(255,215,0,0.9);
            transition:all 0.5s ease;
        }
        #start-btn:hover { transform:scale(1.1); box-shadow:0 0 80px rgba(255,215,0,1); }

        #sun-btn {
            position:fixed; bottom:50px; right:50px; width:100px; height:100px;
            background:radial-gradient(circle at 30% 30%, #fff 5%, #ffd700 35%, #ff8c00 75%);
            border:none; border-radius:50%; cursor:pointer;
            box-shadow:0 0 60px #ffd700, 0 0 120px #ff8c00; z-index:20;
            transition:all 0.5s ease; display:none;
        }
        #sun-btn:hover { transform:scale(1.25) rotate(30deg); }

        .hidden { display:none !important; }

        @media (max-width:600px) {
            .img-frame { width:320px; height:410px; }
            .quote-text { font-size:2rem; }
        }
    </style>
</head>
<body>

    <div class="background-stars"></div>
    <div class="stars" id="stars-container"></div>

    <div class="monitor-container" id="main-box">
        <button id="start-btn">VER COLLAGE DE YAMILET ✨</button>
        
        <div id="content" class="hidden">
            <div class="img-frame" id="frame">
                <img id="slideshow" src="19958.jpg" alt="Yamilet Rifat" class="profile-img">
            </div>
            
            <div id="quote-container"></div>
        </div>
    </div>

    <button id="sun-btn" title="Pausar / Reanudar + Cambiar Canción">☀</button>

    <audio id="bg-music" loop></audio>

    <script>
        const photos = ["19958.jpg", "19951.jpg", "19962.jpg", "19935.jpg", "19947.jpg", "19943.jpg", "1230.jpg"];
        const quotes = [
            "¡YAMILET, REINA DE SU DESTINO!",
            "CADA MOMENTO ES UNA VICTORIA.",
            "LA ELEGANCIA ES TU PODER.",
            "BRILLANDO EN CADA LUGAR.",
            "NADA TE DETIENE.",
            "DE PARTE DEL KIKI CON AMOR."
        ];
        const colors = ['#ff4d4d', '#4dff4d', '#ffdf00', '#ff4dff', '#4dd2ff', '#ffffff', '#ff9a9e', '#a8ffcc', '#ffd700'];

        const startBtn = document.getElementById('start-btn');
        const content = document.getElementById('content');
        const music = document.getElementById('bg-music');
        const imgElement = document.getElementById('slideshow');
        const frame = document.getElementById('frame');
        const mainBox = document.getElementById('main-box');
        const quoteContainer = document.getElementById('quote-container');
        const sunBtn = document.getElementById('sun-btn');
        const starsContainer = document.getElementById('stars-container');

        let photoIndex = 0;
        let quoteIndex = 0;
        let isPlaying = false;
        let intervalId = null;
        let songHandles = [];  // Handles de archivos de audio

        // Nombres aproximados de canciones (ajusta si los nombres exactos varían)
        const songNamesKeywords = [
            "Tu jardin con enanitos",
            "La promesa",
            "Fuiste Tu",
            "Historia De Taxi"
        ];

        // Crear estrellas cayendo
        function createShootingStar() {
            const star = document.createElement('div');
            star.classList.add('shooting-star');
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = '-80px';
            star.style.animationDuration = (Math.random() * 6 + 6) + 's';
            starsContainer.appendChild(star);
            setTimeout(() => star.remove(), 15000);
        }
        setInterval(createShootingStar, 2500);

        async function loadSongsFromDownloads() {
            try {
                // Pedir acceso a la carpeta Descargas (Downloads)
                const dirHandle = await window.showDirectoryPicker({
                    mode: 'read',
                    startIn: 'downloads'  // Intenta abrir directamente Descargas si el navegador lo soporta
                });

                songHandles = [];
                for await (const entry of dirHandle.values()) {
                    if (entry.kind === 'file') {
                        const file = await entry.getFile();
                        const nameLower = file.name.toLowerCase();
                        // Buscar si coincide con alguna palabra clave de las canciones
                        if (songNamesKeywords.some(kw => nameLower.includes(kw.toLowerCase())) &&
                            (file.type.startsWith('audio/') || file.name.endsWith('.mp3') || file.name.endsWith('.mp4') || file.name.endsWith('.m4a'))) {
                            songHandles.push({ handle: entry, file });
                        }
                    }
                }

                if (songHandles.length === 0) {
                    alert("No encontré canciones de Arjona o Melendi en la carpeta seleccionada. Asegúrate de que estén ahí y tengan nombres similares.");
                    return false;
                }

                alert(`¡Perfecto! Encontré ${songHandles.length} canciones. Se reproducirán automáticamente.`);
                return true;
            } catch (err) {
                console.error(err);
                alert("No se pudo acceder a la carpeta Descargas. Elige manualmente la carpeta donde están las canciones.\n\nNota: Chrome/Edge permiten 'Descargas' directamente si das permiso.");
                return false;
            }
        }

        function playRandomSong() {
            if (songHandles.length === 0) return;
            const randomIndex = Math.floor(Math.random() * songHandles.length);
            const selected = songHandles[randomIndex];
            const file = selected.file || selected.handle.getFile(); // fallback
            const url = URL.createObjectURL(file);
            music.src = url;
            music.load();
            if (isPlaying) {
                music.play().catch(e => console.log("Autoplay bloqueado:", e));
            }
        }

        function updateGallery() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            frame.style.borderColor = randomColor;
            frame.style.boxShadow = `0 0 80px ${randomColor}aa, inset 0 0 40px ${randomColor}50`;
            mainBox.style.border = `1px solid ${randomColor}80`;

            imgElement.style.opacity = 0;
            imgElement.style.transform = 'scale(1.1)';

            setTimeout(() => {
                imgElement.src = photos[photoIndex];
                imgElement.style.opacity = 1;
                imgElement.style.transform = 'scale(1)';

                quoteContainer.innerHTML = `<h1 class="quote-text" style="color: ${randomColor}">${quotes[quoteIndex]}</h1>`;

                photoIndex = (photoIndex + 1) % photos.length;
                quoteIndex = (quoteIndex + 1) % quotes.length;
            }, 900);
        }

        async function startAnimation() {
            if (!isPlaying) {
                const hasAccess = await loadSongsFromDownloads();
                if (!hasAccess) return;

                playRandomSong();
                updateGallery();
                intervalId = setInterval(updateGallery, 5000);
                sunBtn.style.display = 'block';
                isPlaying = true;
                music.volume = 0.4; // Volumen moderado
            }
        }

        function toggleAnimation() {
            if (isPlaying) {
                clearInterval(intervalId);
                music.pause();
                isPlaying = false;
            } else {
                playRandomSong(); // Cambia canción al reanudar
                updateGallery();
                intervalId = setInterval(updateGallery, 5000);
                isPlaying = true;
                music.play().catch(() => {});
            }
        }

        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden');
            content.classList.remove('hidden');
            startAnimation();
        });

        sunBtn.addEventListener('click', toggleAnimation);
    </script>
</body>
</html>
