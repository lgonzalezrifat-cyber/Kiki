<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Motivación - Yamilet</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .monitor-container {
            text-align: center;
            padding: 40px;
            border: 2px solid #ffdf00; /* Borde dorado */
            border-radius: 20px;
            background: rgba(20, 10, 0, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255, 223, 0, 0.3);
            width: 90%;
            max-width: 800px;
            z-index: 2;
        }

        /* FOTO DE YAMILET */
        .profile-img {
            width: 280px;
            height: 280px;
            border-radius: 20px; /* Bordes redondeados pero no círculo total para que se aprecie el paisaje */
            object-fit: cover;
            border: 4px solid #ffdf00;
            box-shadow: 0 0 25px #ffdf00;
            margin-bottom: 25px;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 20px #ffdf00; }
            to { transform: scale(1.03); box-shadow: 0 0 40px #ffdf00; }
        }

        #quote-container {
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quote-text {
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            transition: all 0.5s ease;
        }

        #start-btn {
            background: #ffdf00;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px #ffdf00;
        }

        #start-btn:hover {
            transform: scale(1.1);
            background: #fff;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="monitor-container">
        <button id="start-btn">INICIAR SISTEMA YAMILET</button>
        
        <div id="content" class="hidden">
            <img src="yamilet.jpg" alt="Yamilet Rifat" class="profile-img">
            
            <div id="quote-container"></div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        const quotes = [
            "¡YAMILET, ERES UNA LÍDER!",
            "EL ÉXITO TE PERTENECE.",
            "TU FUERZA NO TIENE LÍMITES.",
            "CADA PASO TE ACERCA A TU META.",
            "BRILLA CON TU PROPIA LUZ.",
            "ESTO ES DEL KIKI PARA EL MUNDO."
        ];

        const colors = ['#ff4d4d', '#4dff4d', '#ffdf00', '#ff4dff', '#4dd2ff'];
        const startBtn = document.getElementById('start-btn');
        const content = document.getElementById('content');
        const music = document.getElementById('bg-music');
        const quoteContainer = document.getElementById('quote-container');
        
        let index = 0;

        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden');
            content.classList.remove('hidden');
            music.play().catch(e => console.log("Audio block by browser"));
            showQuote();
        });

        function showQuote() {
            quoteContainer.innerHTML = '';
            const q = document.createElement('h1');
            q.innerText = quotes[index];
            q.className = 'quote-text';
            q.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            quoteContainer.appendChild(q);
            
            // Efecto de desvanecimiento
            q.style.opacity = 0;
            setTimeout(() => q.style.opacity = 1, 100);

            setTimeout(() => {
                q.style.opacity = 0;
                setTimeout(() => {
                    index = (index + 1) % quotes.length;
                    showQuote();
                }, 500);
            }, 3500);
        }
    </script>
</body>
</html>
